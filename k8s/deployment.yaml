apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app-deployment
  labels:
    app: cicd-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-app
  template:
    metadata:
      labels:
        app: cicd-app
    spec:
      containers:
      - name: cicd-app
        image: amitabhdevops/cicd-app:b26fa617f7b296a16bb88e6e3d331dbdd3b9b5f8
        ports:
        - containerPort: 3000
