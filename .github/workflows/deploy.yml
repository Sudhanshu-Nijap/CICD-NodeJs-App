name: "CICD NodeJS Application"

on:
    push:
        branches: [ "main" ]

        paths-ignore:
            - 'README.md'

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: DockerHub Login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Dockerfile
              run: |
                docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }} .
            
            - name: Push to DockerHub
              run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }}

    update-manifest:
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3
              with:
                token: ${{ secrets.PAT_GITHUB }}

            - name: Update Kubernetes Manifest
              run: |
                sed -i "s|image: amitabhdevops/cicd-app:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:${{ github.sha }}|g" k8s/deployment.yaml

            - name: Commit and Push Changes
              run: |
                git config --global user.name "GitHub Actions Bot"
                git config --global user.email "actions@github.com"
                git add k8s/deployment.yaml
                git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
                git push